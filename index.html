<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Tharun</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    height:100vh;
    background:linear-gradient(to bottom,#000000,#020024,#090979);
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
}

/* Button */

#startBtn{
    position:absolute;
    z-index:20;
    padding:15px 30px;
    font-size:22px;
    border:none;
    border-radius:10px;
    background:#ff00ff;
    color:white;
    cursor:pointer;
    box-shadow:0 0 20px #ff00ff;
}

/* Text */

.container{
    text-align:center;
    z-index:10;
}

h1{
    color:white;
    font-size:60px;
    text-shadow:0 0 10px #fff,0 0 20px #ff00ff,0 0 40px #00ffff;
    animation:zoom 2s infinite alternate;
}

.wish{
    display:block;
    margin-top:20px;
    font-size:25px;
    color:white;
    text-shadow:0 0 10px #00ffff;
    animation:blinkText 2s infinite alternate;
}

/* Animations */

@keyframes zoom{
    from{transform:scale(1);}
    to{transform:scale(1.08);}
}

@keyframes blinkText{
    from{opacity:0.5;}
    to{opacity:1;}
}

/* Stars */

.star{
    position:absolute;
    width:4px;
    height:4px;
    background:white;
    border-radius:50%;
    animation:blink 2s infinite;
}

@keyframes blink{
    0%,100%{opacity:0.2;transform:scale(1);}
    50%{opacity:1;transform:scale(2);box-shadow:0 0 10px white,0 0 20px cyan;}
}

/* Fireworks */

.firework{
    position:absolute;
    width:6px;
    height:6px;
    border-radius:50%;
    animation:explode 1.5s linear forwards;
}

@keyframes explode{
    0%{transform:translate(0,0) scale(1);opacity:1;}
    100%{
        transform:translate(var(--x),var(--y)) scale(0);
        opacity:0;
    }
}

</style>
</head>

<body>

<!-- Button -->
<button id="startBtn">Click Me 🎉</button>

<!-- Content -->
<div class="container">
<h1>Happy Birthday ✨ Tharun🥰</h1>
<span class="wish">May this year all your dreams come true 🥳</span>
</div>

<!-- AUDIO (FIXED) -->
<audio id="sound" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8e1f9b7.mp3?filename=fireworks-29629.mp3" type="audio/mpeg">
</audio>

<script>

const btn = document.getElementById("startBtn");
const sound = document.getElementById("sound");

/* CLICK TO START SOUND (FIXED SAFE PLAY) */
btn.addEventListener("click", async () => {
    try {
        await sound.play();
        btn.style.display = "none";
    } catch (err) {
        console.log("Sound blocked:", err);
        alert("Tap again to enable sound 🔊");
    }
});

/* STARS */
for(let i=0;i<200;i++){
    let star=document.createElement("div");
    star.classList.add("star");
    star.style.top=Math.random()*100+"vh";
    star.style.left=Math.random()*100+"vw";
    let size=Math.random()*4+1;
    star.style.width=size+"px";
    star.style.height=size+"px";
    star.style.animationDuration=(Math.random()*3+1)+"s";
    document.body.appendChild(star);
}

/* FIREWORKS */
function firework(){
    let colors=["#ff0000","#00ff00","#00ffff","#ff00ff","#ffff00","#ff8800","#ffffff"];

    let x=Math.random()*window.innerWidth;
    let y=Math.random()*window.innerHeight;

    for(let i=0;i<80;i++){
        let p=document.createElement("div");
        p.classList.add("firework");
        document.body.appendChild(p);

        let angle=Math.random()*360;
        let dist=Math.random()*250;

        p.style.left=x+"px";
        p.style.top=y+"px";
        p.style.background=colors[Math.floor(Math.random()*colors.length)];

        p.style.setProperty("--x",Math.cos(angle)*dist+"px");
        p.style.setProperty("--y",Math.sin(angle)*dist+"px");

        setTimeout(()=>p.remove(),1500);
    }
}

setInterval(firework,700);

</script>

</body>
</html>

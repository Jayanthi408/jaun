<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday✨ Tharun🥰</title> 
<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    height:100vh;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, sans-serif;
}

/* Birthday Text */
h1{
    position:absolute;
    color:white;
    font-size:60px;
    text-align:center;
    z-index:10;

    text-shadow:
    0 0 10px #fff,
    0 0 20px #ff00ff,
    0 0 40px #00ffff;

    animation: zoom 2s infinite alternate;
}

@keyframes zoom{
    from{
        transform:scale(1);
    }
    to{
        transform:scale(1.08);
    }
}

/* Firework Particle */
.firework{
    position:absolute;
    width:6px;
    height:6px;
    border-radius:50%;
    animation: explode 1.5s linear forwards;
}

@keyframes explode{

    0%{
        transform:translate(0,0) scale(1);
        opacity:1;
    }

    100%{
        transform:
        translate(var(--x),var(--y))
        scale(0);

        opacity:0;
    }
}

</style>
</head>

<body>

<h1>Happy Birthday ✨ Tharun</h1>
<h2> May this year all your dreams comes true and fullfillness 🥳</h2>

<script>

function createFirework(){

    let colors=[
        "#ff0000",
        "#00ff00",
        "#00ffff",
        "#ff00ff",
        "#ffff00",
        "#ff8800",
        "#ffffff"
    ];

    let x=Math.random()*window.innerWidth;
    let y=Math.random()*window.innerHeight;

    for(let i=0;i<80;i++){

        let particle=document.createElement("div");
        particle.classList.add("firework");

        document.body.appendChild(particle);

        let angle=Math.random()*360;
        let distance=Math.random()*250;

        let moveX=Math.cos(angle)*distance+"px";
        let moveY=Math.sin(angle)*distance+"px";

        particle.style.left=x+"px";
        particle.style.top=y+"px";

        particle.style.background=
        colors[Math.floor(Math.random()*colors.length)];

        particle.style.setProperty("--x",moveX);
        particle.style.setProperty("--y",moveY);

        particle.style.boxShadow=
        "0 0 20px " + particle.style.background;

        setTimeout(()=>{
            particle.remove();
        },1500);
    }
}

/* Repeat Fireworks */
setInterval(createFirework,700);

</script>

</body>
</html>
